<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NovaOS</title>

    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apps.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/taskbar.css">
    <link rel="stylesheet" href="css/windows.css">

</head>

<body>

    <!-- =================================
                 ESCRITORIO
         ================================= -->

    <main id="desktop">

    <div id="start-menu" class="hidden">

        <h2>NovaOS</h2>

        <button class="app-button">📄 Bloc de notas</button>

        <button class="app-button">🧮 Calculadora</button>

        <button class="app-button">💻 Terminal</button>

        <button class="app-button">⚙ Configuración</button>

<div id="windows-container"></div>

</main>

         ================================== -->

    <footer id="taskbar">

        <div id="start-button">

            Inicio

        </div>

        <div id="taskbar-apps">



        </div>

        <div id="clock">

            00:00

        </div>

    </footer>

    <script src="js/taskbar.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/windowManager.js"></script>
    <script src="js/main.js"></script>
